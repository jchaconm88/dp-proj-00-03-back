name: Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  IMAGE_NAME: ${{ secrets.GCP_PROJECT_ID }}/dp-proj-00-03-cms/cms

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run property tests
        run: pnpm test:properties

      - name: Run unit tests
        run: pnpm test:unit
        continue-on-error: true

      - name: Integration tests
        run: pnpm test:integration

      - name: Typecheck
        run: pnpm typecheck
        env:
          PAYLOAD_SECRET: ci-build-placeholder-secret-min-32-chars
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Lint
        run: pnpm lint

      - name: Production build (Next.js)
        run: pnpm build
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: 1
          # Placeholders para que el typecheck de build no falle por env vacío
          PAYLOAD_SECRET: ci-build-placeholder-secret-min-32-chars
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

  migrate:
    name: Database migrations
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run Payload migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_MIGRATE }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
        run: pnpm db:migrate

      - name: Grants and RLS policies
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_MIGRATE }}
        run: pnpm db:post-migrate

  build-and-push:
    name: Build & Push Docker image
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      # No pasar la URI completa: GitHub enmascara outputs que contienen secretos (PROJECT_ID/REGION)
      previous_image: ${{ steps.current_revision.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Get current Cloud Run revision (for rollback)
        id: current_revision
        run: |
          image=$(gcloud run services describe dp-proj-00-03-cms \
            --region=${{ secrets.GCP_REGION }} \
            --format='value(spec.template.spec.containers[0].image)' \
            2>/dev/null || echo "")
          echo "image=$image" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Cloud Run
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Prepare Cloud Run environment file
        run: |
          cat > /tmp/cloudrun-env.yaml <<EOF
          NODE_ENV: production
          DATABASE_URL: "${{ secrets.DATABASE_URL }}"
          PAYLOAD_SECRET: "${{ secrets.PAYLOAD_SECRET }}"
          PAYLOAD_PUBLIC_SERVER_URL: "${{ secrets.PAYLOAD_PUBLIC_SERVER_URL }}"
          FIREBASE_STORAGE_BUCKET: "${{ secrets.FIREBASE_STORAGE_BUCKET }}"
          FIREBASE_PROJECT_ID: "${{ secrets.FIREBASE_PROJECT_ID }}"
          RESEND_API_KEY: "${{ secrets.RESEND_API_KEY }}"
          TURNSTILE_SECRET_KEY: "${{ secrets.TURNSTILE_SECRET_KEY }}"
          FRONTEND_WEBHOOK_URL: "${{ secrets.FRONTEND_WEBHOOK_URL }}"
          FRONTEND_WEBHOOK_SECRET: "${{ secrets.FRONTEND_WEBHOOK_SECRET }}"
          JWT_EXTERNAL_PROVIDERS: "${{ secrets.JWT_EXTERNAL_PROVIDERS }}"
          ALERT_EMAIL: "${{ secrets.ALERT_EMAIL }}"
          EOF

      - name: Resolve container image
        id: image
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/dp-proj-00-03-cms/cms:sha-${{ github.sha }}"
          echo "uri=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Deploying: $IMAGE"

      - name: Reset conflicting env vars (Secret Manager → GitHub literals)
        run: |
          ENV_KEYS="DATABASE_URL,PAYLOAD_SECRET,RESEND_API_KEY,TURNSTILE_SECRET_KEY,FRONTEND_WEBHOOK_SECRET"
          REGION="${{ secrets.GCP_REGION }}"
          # --clear-env-vars no acepta lista; usar --remove-secrets y --remove-env-vars.
          gcloud run services update dp-proj-00-03-cms \
            --region="$REGION" \
            --remove-secrets="$ENV_KEYS" \
            --quiet || true
          gcloud run services update dp-proj-00-03-cms \
            --region="$REGION" \
            --remove-env-vars="$ENV_KEYS" \
            --quiet || true

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy dp-proj-00-03-cms \
            --region="${{ secrets.GCP_REGION }}" \
            --image="${{ steps.image.outputs.uri }}" \
            --env-vars-file=/tmp/cloudrun-env.yaml \
            --update-labels=managed-by=github-actions,commit-sha=${{ github.sha }} \
            --quiet
          URL=$(gcloud run services describe dp-proj-00-03-cms \
            --region="${{ secrets.GCP_REGION }}" \
            --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Health check post-deploy
        id: health
        run: |
          URL="${{ steps.deploy.outputs.url }}/api/health"
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$status" = "200" ]; then
              echo "Health check OK"
              exit 0
            fi
            echo "Intento $i: status $status, esperando..."
            sleep 5
          done
          echo "Health check fallido después de 60s"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.health.outcome == 'failure'
        run: |
          PREV_IMAGE="${{ needs.build-and-push.outputs.previous_image }}"
          if [ -n "$PREV_IMAGE" ]; then
            echo "Rollback a imagen anterior: $PREV_IMAGE"
            gcloud run services update dp-proj-00-03-cms \
              --region=${{ secrets.GCP_REGION }} \
              --image="$PREV_IMAGE" \
              --quiet
          else
            echo "No hay imagen anterior para rollback"
            exit 1
          fi
        timeout-minutes: 5
